name: Static site checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_static_site.py
